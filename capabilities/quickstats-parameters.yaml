naftiko: 1.0.0-alpha2
info:
  label: USDA NASS QuickStats API — Parameters
  description: 'USDA NASS QuickStats API — Parameters. 1 operations. Lead operation: USDA NASS Get Parameter Values. Self-contained
    Naftiko capability covering one Agricultural Statistics Service business surface.'
  tags:
  - Agricultural Statistics Service
  - Parameters
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AGRICULTURAL_STATISTICS_SERVICE_API_KEY: AGRICULTURAL_STATISTICS_SERVICE_API_KEY
capability:
  consumes:
  - type: http
    namespace: quickstats-parameters
    baseUri: https://quickstats.nass.usda.gov/api
    description: USDA NASS QuickStats API — Parameters business capability. Self-contained, no shared references.
    resources:
    - name: get_param_values
      path: /get_param_values
      operations:
      - name: getparamvalues
        method: GET
        description: USDA NASS Get Parameter Values
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: key
          in: query
          type: string
          description: API key.
          required: true
        - name: param
          in: query
          type: string
          description: The parameter name for which to return all valid values (e.g., commodity_desc, state_alpha, statisticcat_desc).
          required: true
    authentication:
      type: apikey
      key: key
      value: '{{env.AGRICULTURAL_STATISTICS_SERVICE_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: quickstats-parameters-rest
    port: 8080
    description: REST adapter for USDA NASS QuickStats API — Parameters. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/get-param-values
      name: get-param-values
      description: REST surface for get_param_values.
      operations:
      - method: GET
        name: getparamvalues
        description: USDA NASS Get Parameter Values
        call: quickstats-parameters.getparamvalues
        with:
          key: rest.key
          param: rest.param
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: quickstats-parameters-mcp
    port: 9090
    transport: http
    description: MCP adapter for USDA NASS QuickStats API — Parameters. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: usda-nass-get-parameter-values
      description: USDA NASS Get Parameter Values
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: quickstats-parameters.getparamvalues
      with:
        key: tools.key
        param: tools.param
      outputParameters:
      - type: object
        mapping: $.
