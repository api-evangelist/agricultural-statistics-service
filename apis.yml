apis:
- aid: agricultural-statistics-service:quickstats-api
  name: USDA NASS QuickStats API
  description: The QuickStats API provides direct programmatic access to the statistical information contained in the NASS
    Quick Stats database, covering official published aggregate estimates related to U.S. agricultural production. The API
    supports filtering by commodity, location, and time with comparison operators. Responses are available in JSON, XML, or
    CSV format. An API key is required; maximum 50,000 records per request.
  humanURL: https://quickstats.nass.usda.gov/api
  baseURL: https://quickstats.nass.usda.gov/api
  tags:
  - Agricultural Statistics
  - Crop Data
  - Livestock Data
  - Census Of Agriculture
  - Open Data
