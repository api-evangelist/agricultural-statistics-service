- aid: agricultural-statistics-service:cropland-cros-api
  name: USDA NASS CroplandCROS API
  description: The CroplandCROS API provides access to the Cropland Data Layer (CDL), a crop-specific land cover data layer
    with 30-meter spatial resolution covering the continental United States. Historical CDL data is available back to 1997
    for select states.
  humanURL: https://www.nass.usda.gov/developer/index.php
  baseURL: https://nassgeodata.gmu.edu/CropScapeService
  tags:
