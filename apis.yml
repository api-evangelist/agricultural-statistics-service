- aid: agricultural-statistics-service:crop-casma-api
  name: USDA NASS Crop CASMA API
  description: The Crop CASMA API provides programmatic access to crop vegetation and soil moisture conditions using NASA
    SMAP and MODIS satellite data for agricultural drought monitoring and crop condition analysis.
  humanURL: https://www.nass.usda.gov/developer/index.php
  baseURL: https://nassgeodata.gmu.edu/CropCASMA
