description: The National Agricultural Statistics Service (NASS) is an agency of the United States Department of Agriculture
  (USDA) whose mission is to support the United States, its agricultural sector, and rural communities by providing accurate,
  objective, and meaningful statistical information and services. NASS operates the QuickStats API for programmatic access
  to agricultural survey and census data, as well as geospatial APIs for cropland data, vegetation conditions, and crop moisture
  monitoring covering the continental United States.
