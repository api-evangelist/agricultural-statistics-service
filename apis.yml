- aid: agricultural-statistics-service:vegscape-api
  name: USDA NASS VegScape API
  description: The VegScape API delivers vegetation condition indices at 250-meter spatial resolution covering the continental
    United States. Data includes daily and weekly vegetation index composites available since 2000.
  humanURL: https://www.nass.usda.gov/developer/index.php
  baseURL: https://nassgeodata.gmu.edu/VegScape
  tags:
